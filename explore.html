<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explore - FocusOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Oxygen-Sans, Ubuntu, Cantarell, 'Fira Sans', 'Droid Sans',
          'Helvetica Neue', Helvetica, 'Inter', Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      /* Search Bar Style matched from main.html */
      .search-bar {
        background-color: #efefef;
        border-radius: 24px;
        transition: background-color 0.2s;
      }
      .search-bar:hover {
        background-color: #e2e2e2;
      }

      .card-masonry {
        border-radius: 16px;
        overflow: hidden;
        transition: transform 0.3s ease;
      }
      .card-masonry:hover {
        transform: translateY(-2px);
      }

      .focus-logo-container {
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .focus-logo-container img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
    </style>
  </head>
  <body class="bg-white text-black">
    <nav class="fixed top-0 w-full h-20 bg-white z-50 border-b border-slate-50">
      <div class="max-w-[1280px] mx-auto h-full px-8 flex items-center gap-4">
        <a href="main.html" class="focus-logo-container">
          <img
            src="barnd-logo.jpg"
            alt="Logo"
            class="w-10 h-10 object-contain"
          />
        </a>

        <div class="hidden md:flex gap-2">
          <a
            href="main.html"
            class="px-4 py-3 font-bold rounded-full hover:bg-slate-100"
          >
            Home
          </a>

          <button class="px-4 py-3 font-bold rounded-full bg-black text-white">
            Explore
          </button>
        </div>

        <div class="flex-1 flex items-center search-bar px-4 py-3 gap-3">
          <i data-lucide="search" size="18" class="text-slate-500"></i>
          <input
            type="text"
            placeholder="Search for focus tools, ideas, or tasks"
            class="bg-transparent border-none outline-none w-full text-sm"
          />
        </div>

        <div class="flex items-center gap-2">
          <button class="p-3 hover:bg-slate-100 rounded-full">
            <i data-lucide="bell" size="24"></i>
          </button>
          <button class="p-3 hover:bg-slate-100 rounded-full">
            <i data-lucide="message-circle" size="24"></i>
          </button>
          <div
            class="w-8 h-8 rounded-full bg-slate-200 overflow-hidden ml-2 cursor-pointer"
          >
            <img
              src="https://api.dicebear.com/7.x/avataaars/svg?seed=John"
              alt="User"
            />
          </div>
        </div>
      </div>
    </nav>

    <main class="pt-24 px-8 max-w-[1280px] mx-auto">
      <h1 class="text-4xl font-black mb-8 tracking-tighter">Explore Tools</h1>

      <section class="columns-1 sm:columns-2 lg:columns-3 gap-4 space-y-4">
        <div
          class="card-masonry bg-[#f0f9ff] border border-blue-100 p-8 break-inside-avoid"
        >
          <div class="flex items-center gap-3 mb-6">
            <div class="p-4 bg-blue-100 rounded-full text-blue-600">
              <i data-lucide="calendar-days" size="24"></i>
            </div>
            <h2 class="text-2xl font-bold">Habits</h2>
          </div>
          <p class="text-slate-600 mb-8 font-medium">
            Track your daily routines and build better consistency.
          </p>
          <button
            class="bg-blue-600 text-white px-6 py-4 rounded-full font-bold w-full hover:bg-blue-700 transition"
          >
            Open Habits
          </button>
        </div>

        <div
          class="card-masonry bg-[#f0fff4] border border-green-100 p-8 break-inside-avoid"
        >
          <div class="flex items-center gap-3 mb-6">
            <div class="p-4 bg-green-100 rounded-full text-green-600">
              <i data-lucide="plus-circle" size="24"></i>
            </div>
            <h2 class="text-2xl font-bold">Add Income</h2>
          </div>
          <p class="text-slate-600 mb-8 font-medium">
            Log your earnings and track cash flow.
          </p>
          <button
            class="bg-green-600 text-white px-6 py-4 rounded-full font-bold w-full hover:bg-green-700 transition"
          >
            Add Income
          </button>
        </div>

        <div
          class="card-masonry bg-[#fff5f5] border border-red-100 p-8 break-inside-avoid"
        >
          <div class="flex items-center gap-3 mb-6">
            <div class="p-4 bg-red-100 rounded-full text-red-600">
              <i data-lucide="minus-circle" size="24"></i>
            </div>
            <h2 class="text-2xl font-bold">Add Expenses</h2>
          </div>
          <p class="text-slate-600 mb-8 font-medium">
            Track your spending and manage your budget.
          </p>
          <button
            class="bg-red-600 text-white px-6 py-4 rounded-full font-bold w-full hover:bg-red-700 transition"
          >
            Add Expense
          </button>
        </div>
      </section>
    </main>

    <script>
      lucide.createIcons()
    </script>
  </body>
</html>
