<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Habit_Grid // FocusOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;800&display=swap");

    :root {
      --bg: #080808;
      --accent: #b3a577;
      --border: #151515;
    }

    body {
      background: var(--bg);
      color: #fff;
      font-family: "JetBrains Mono", monospace;
      padding: 3rem;
      margin: 0;
    }

    /* Clean Grid Layout */
    .habit-grid {
      display: grid;
      grid-template-columns: 220px repeat(7, 1fr);
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
    }

    .grid-cell {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      text-transform: uppercase;
    }

    .habit-name-cell {
      justify-content: flex-start;
      color: #666;
      background: #0a0a0a;
      font-size: 9px;
      letter-spacing: 1px;
    }

    .day-header {
      color: #333;
      font-weight: 800;
      background: #050505;
      letter-spacing: 2px;
    }

    /* Icon Toggles */
    .status-icon {
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.1s ease;
      user-select: none;
    }

    .status-icon:active {
      transform: scale(0.9);
    }

    .icon-right {
      color: var(--accent);
      font-weight: bold;
    }

    .icon-wrong {
      color: #222;
      /* Dimmed so it's not irritating */
      opacity: 0.5;
    }

    /* UI Elements */
    .input-group {
      display: flex;
      border: 1px solid var(--border);
      width: fit-content;
      margin-bottom: 2rem;
    }

    .input-area {
      background: transparent;
      border: none;
      padding: 10px 15px;
      color: var(--accent);
      font-size: 10px;
      outline: none;
      width: 200px;
      text-transform: uppercase;
    }

    .deploy-btn {
      background: var(--accent);
      color: #000;
      font-size: 9px;
      font-weight: 800;
      padding: 0 15px;
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <header class="mb-10">
    <a href="index.html"
      class="text-[9px] text-[#b3a577] tracking-[0.4em] uppercase mb-10 block opacity-40 hover:opacity-100 transition">
      << Return_to_Core </a>
        <h1 class="text-lg font-black tracking-tighter uppercase opacity-30">
          Protocol_Grid // Logic_Mode
        </h1>
  </header>

  <div class="input-group">
    <input type="text" id="habit-input" placeholder="New_Protocol..." class="input-area"
      onkeypress="if(event.key==='Enter') addHabit()">
    <button onclick="addHabit()" class="deploy-btn">Add</button>
  </div>

  <div class="habit-grid" id="main-grid">
    <div class="grid-cell day-header">Identifier</div>
    <div class="grid-cell day-header">M</div>
    <div class="grid-cell day-header">T</div>
    <div class="grid-cell day-header">W</div>
    <div class="grid-cell day-header">T</div>
    <div class="grid-cell day-header">F</div>
    <div class="grid-cell day-header">S</div>
    <div class="grid-cell day-header">S</div>
  </div>

  <div class="mt-8">
    <button onclick="clearAll()"
      class="text-[8px] text-zinc-900 hover:text-red-900 uppercase tracking-widest transition">
      [ Wipe_System_Data ]
    </button>
  </div>

  <script>
    let habitData = JSON.parse(localStorage.getItem('focus_grid_v3')) || [
      { id: 1, name: "DEEP_WORK", checks: [true, true, false, false, false, false, false] },
      { id: 2, name: "SYSTEM_AUDIT", checks: [false, true, true, false, false, false, false] }
    ];

    function save() {
      localStorage.setItem('focus_grid_v3', JSON.stringify(habitData));
      render();
    }

    function addHabit() {
      const input = document.getElementById('habit-input');
      if (!input.value) return;
      habitData.push({
        id: Date.now(),
        name: input.value.replace(/\s+/g, '_').toUpperCase(),
        checks: [false, false, false, false, false, false, false]
      });
      input.value = '';
      save();
    }

    function toggleDay(habitId, dayIndex) {
      const habit = habitData.find(h => h.id === habitId);
      if (habit) {
        habit.checks[dayIndex] = !habit.checks[dayIndex];
        save();
      }
    }

    function deleteHabit(id) {
      habitData = habitData.filter(h => h.id !== id);
      save();
    }

    function clearAll() {
      if (confirm("Protocol: Wipe all data?")) { habitData = []; save(); }
    }

    function render() {
      const grid = document.getElementById('main-grid');
      const headers = Array.from(grid.children).slice(0, 8);
      grid.innerHTML = '';
      headers.forEach(h => grid.appendChild(h));

      habitData.forEach(habit => {
        const nameCell = document.createElement('div');
        nameCell.className = 'grid-cell habit-name-cell';
        nameCell.innerHTML = `<span class="mr-3 opacity-10 hover:opacity-100 cursor-pointer text-white" onclick="deleteHabit(${habit.id})">×</span> ${habit.name}`;
        grid.appendChild(nameCell);

        habit.checks.forEach((checked, index) => {
          const cell = document.createElement('div');
          cell.className = 'grid-cell';

          const icon = document.createElement('div');
          icon.className = `status-icon ${checked ? 'icon-right' : 'icon-wrong'}`;
          // Using standard symbols for a cleaner tech look
          icon.innerText = checked ? '✔' : '✖';

          icon.onclick = () => toggleDay(habit.id, index);
          cell.appendChild(icon);
          grid.appendChild(cell);
        });
      });
    }

    render();
  </script>
</body>

</html>
