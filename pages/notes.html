<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>FocusOS // Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;800&display=swap");

      :root {
        --bg: #080808;
        --accent: #b3a577;
        --panel: #111;
        --border: rgba(255, 255, 255, 0.05);
      }

      body {
        background: var(--bg);
        color: #fff;
        font-family: "JetBrains Mono", monospace;
        margin: 0;
        height: 100vh;
        overflow: hidden;
      }

      /* View Navigation */
      .view {
        position: absolute;
        inset: 0;
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        background: var(--bg);
        display: flex;
        flex-direction: column;
      }
      .view-hidden-right {
        transform: translateX(100%);
      }
      .view-hidden-left {
        transform: translateX(-30%);
        opacity: 0.5;
      }

      /* Components */
      .search-container {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border);
        padding: 12px;
        margin: 0 20px 20px 20px;
        display: flex;
        align-items: center;
      }

      .search-input {
        background: transparent;
        border: none;
        outline: none;
        color: var(--accent);
        font-size: 11px;
        width: 100%;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .folder-chip {
        padding: 6px 14px;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #555;
        border: 1px solid transparent;
        transition: 0.2s;
        cursor: pointer;
      }
      .folder-chip.active {
        color: var(--accent);
        border-bottom: 1px solid var(--accent);
      }

      .note-row {
        padding: 20px;
        border-bottom: 1px solid var(--border);
        transition: 0.2s;
      }
      .note-row:active {
        background: rgba(179, 165, 119, 0.05);
      }

      .fab {
        position: fixed;
        bottom: 30px;
        right: 25px;
        width: 50px;
        height: 50px;
        background: var(--accent);
        color: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .editor-header {
        padding: 15px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      textarea {
        background: transparent;
        border: none;
        outline: none;
        resize: none;
        width: 100%;
        flex-grow: 1;
        color: #888;
        font-size: 14px;
        line-height: 1.8;
        padding: 20px 30px;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <main id="list-view" class="view">
      <header class="p-8 pb-4">
        <h1
          class="text-[10px] text-[#b3a577] tracking-[0.4em] uppercase mb-6 opacity-50"
        >
          Focus_OS // Notes
        </h1>

        <div class="search-container">
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Find_Entry..."
            oninput="renderNotes()"
          />
        </div>

        <div
          id="folder-bar"
          class="flex gap-2 overflow-x-auto no-scrollbar"
        ></div>
      </header>

      <div id="note-list" class="flex-grow overflow-y-auto no-scrollbar"></div>

      <button onclick="createNewNote()" class="fab">＋</button>
    </main>

    <section id="editor-view" class="view view-hidden-right">
      <header class="editor-header">
        <button onclick="closeEditor()" class="text-[#b3a577]"><< Back</button>
        <span id="editor-status" class="opacity-30">Editing_</span>
        <button onclick="deleteCurrentNote()" class="text-red-900">
          Delete
        </button>
      </header>

      <input
        type="text"
        id="note-title"
        placeholder="Entry_Title"
        class="bg-transparent text-xl font-bold p-8 pb-0 outline-none w-full text-white"
        oninput="saveNote()"
      />

      <textarea
        id="note-body"
        placeholder="// Initialize content..."
        oninput="saveNote()"
      ></textarea>
    </section>

    <script>
      let state = JSON.parse(localStorage.getItem("focus_mobile_v1")) || {
        folders: ["General", "Deep_Work", "Logs"],
        notes: [],
        activeFolder: "General",
        activeNoteId: null,
      };

      const listView = document.getElementById("list-view");
      const editorView = document.getElementById("editor-view");
      const noteTitle = document.getElementById("note-title");
      const noteBody = document.getElementById("note-body");
      const searchInput = document.getElementById("search-input");

      function sync() {
        localStorage.setItem("focus_mobile_v1", JSON.stringify(state));
      }

      function renderFolders() {
        const bar = document.getElementById("folder-bar");
        bar.innerHTML = state.folders
          .map(
            (f) => `
          <div onclick="setFolder('${f}')" class="folder-chip ${state.activeFolder === f ? "active" : ""}">${f}</div>
        `,
          )
          .join("");
      }

      function setFolder(f) {
        state.activeFolder = f;
        renderFolders();
        renderNotes();
      }

      function renderNotes() {
        const list = document.getElementById("note-list");
        const query = searchInput.value.toLowerCase();

        const filtered = state.notes.filter((n) => {
          const matchesFolder = n.folder === state.activeFolder;
          const matchesSearch = n.title.toLowerCase().includes(query);
          return matchesFolder && matchesSearch;
        });

        if (filtered.length === 0) {
          list.innerHTML = `<div class="p-20 text-[9px] text-zinc-800 text-center uppercase tracking-widest">No_Entries_Found</div>`;
          return;
        }

        list.innerHTML = filtered
          .map(
            (n) => `
          <div class="note-row" onclick="openNote(${n.id})">
            <div class="text-[11px] font-bold text-white uppercase truncate mb-1">${n.title || "Untitled_Entry"}</div>
            <div class="text-[9px] text-zinc-600 truncate uppercase tracking-tighter">${n.body.substring(0, 45) || "..."}</div>
          </div>
        `,
          )
          .join("");
      }

      function createNewNote() {
        const id = Date.now();
        const newNote = {
          id,
          title: "",
          body: "",
          folder: state.activeFolder,
          date: new Date().toLocaleDateString(),
        };
        state.notes.unshift(newNote);
        state.activeNoteId = id;
        openNote(id);
      }

      function openNote(id) {
        state.activeNoteId = id;
        const note = state.notes.find((n) => n.id === id);
        noteTitle.value = note.title;
        noteBody.value = note.body;

        listView.classList.add("view-hidden-left");
        editorView.classList.remove("view-hidden-right");
      }

      function closeEditor() {
        listView.classList.remove("view-hidden-left");
        editorView.classList.add("view-hidden-right");
        sync();
        renderNotes();
      }

      function saveNote() {
        const note = state.notes.find((n) => n.id === state.activeNoteId);
        if (note) {
          note.title = noteTitle.value;
          note.body = noteBody.value;
          sync();
        }
      }

      function deleteCurrentNote() {
        if (confirm("Confirm Destruction?")) {
          state.notes = state.notes.filter((n) => n.id !== state.activeNoteId);
          closeEditor();
        }
      }

      // Initialize
      renderFolders();
      renderNotes();
    </script>
  </body>
</html>
