<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FocusOS // Notes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;800&display=swap");

    :root {
      --bg: #080808;
      --accent: #b3a577;
      --panel: #0d0d0d;
      --border: rgba(255, 255, 255, 0.05);
    }

    body {
      background: var(--bg);
      color: #fff;
      font-family: "JetBrains Mono", monospace;
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* Fixed Sidebar - Width increased slightly for horizontal text */
    .sidebar {
      width: 85px;
      background: #050505;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 30px;
      z-index: 20;
    }

    .nav-item {
      width: 100%;
      padding: 20px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      /* Small techy size */
      color: #444;
      text-transform: uppercase;
      transition: 0.3s;
      cursor: pointer;
      letter-spacing: 1px;
      position: relative;
    }

    .nav-item.active {
      color: var(--accent);
      font-weight: 800;
    }

    /* Gold indicator dot for active folder */
    .nav-item.active::after {
      content: "";
      position: absolute;
      right: 0;
      width: 2px;
      height: 20px;
      background: var(--accent);
    }

    .home-icon {
      margin-bottom: 40px;
      opacity: 0.4;
      color: var(--accent);
    }

    /* Main List Area */
    .main-content {
      flex-grow: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    /* View Transitions */
    .view {
      position: absolute;
      inset: 0;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    .view-hidden-right {
      transform: translateX(100%);
    }

    .search-bar {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      padding: 12px;
      margin: 0 20px 20px 20px;
      font-size: 10px;
      color: var(--accent);
      outline: none;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .note-row {
      padding: 20px 25px;
      border-bottom: 1px solid var(--border);
    }

    .fab {
      position: fixed;
      bottom: 30px;
      right: 25px;
      width: 50px;
      height: 50px;
      background: var(--accent);
      color: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      z-index: 30;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    textarea {
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      width: 100%;
      flex-grow: 1;
      color: #888;
      font-size: 14px;
      line-height: 1.8;
      padding: 20px 30px;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>

<body>

  <aside class="sidebar">
    <a href="/index.html" class="home-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
      </svg>
    </a>

    <div id="folder-list" class="w-full flex flex-col">
    </div>
  </aside>

  <div class="main-content">
    <header class="pt-10">
      <h1 id="folder-label" class="px-6 text-[10px] text-zinc-600 tracking-[0.4em] uppercase mb-4">General</h1>
      <input type="text" id="search-input" class="search-bar w-[calc(100%-40px)]" placeholder="Find_Entry..."
        oninput="renderNotes()">
    </header>

    <div id="note-list" class="flex-grow overflow-y-auto no-scrollbar"></div>

    <button onclick="createNewNote()" class="fab">＋</button>

    <section id="editor-view" class="view view-hidden-right">
      <header class="p-5 border-b border-white/5 flex justify-between items-center">
        <button onclick="closeEditor()" class="text-[#b3a577] text-[10px] uppercase font-bold tracking-[0.2em]">
          < Back</button>
            <button onclick="deleteCurrentNote()" class="text-red-900 text-[10px] uppercase">Purge</button>
      </header>
      <input type="text" id="note-title" placeholder="Entry_Title"
        class="bg-transparent text-xl font-bold p-8 pb-4 outline-none w-full text-white" oninput="saveNote()">
      <textarea id="note-body" placeholder="// Initialize content..." oninput="saveNote()"></textarea>
    </section>
  </div>

  <script>
    let state = JSON.parse(localStorage.getItem("focus_mobile_v4")) || {
      folders: ["General", "Work", "Logs"],
      notes: [],
      activeFolder: "General",
      activeNoteId: null
    };

    const noteList = document.getElementById('note-list');
    const editorView = document.getElementById('editor-view');
    const noteTitle = document.getElementById('note-title');
    const noteBody = document.getElementById('note-body');
    const folderLabel = document.getElementById('folder-label');

    function sync() { localStorage.setItem("focus_mobile_v4", JSON.stringify(state)); }

    function renderFolders() {
      const list = document.getElementById('folder-list');
      list.innerHTML = state.folders.map(f => `
          <div onclick="setFolder('${f}')" class="nav-item ${state.activeFolder === f ? 'active' : ''}">
            ${f}
          </div>
        `).join('');
      folderLabel.innerText = state.activeFolder;
    }

    function setFolder(f) {
      state.activeFolder = f;
      renderFolders();
      renderNotes();
    }

    function renderNotes() {
      const query = document.getElementById('search-input').value.toLowerCase();
      const filtered = state.notes.filter(n =>
        n.folder === state.activeFolder &&
        (n.title.toLowerCase().includes(query) || n.body.toLowerCase().includes(query))
      );

      noteList.innerHTML = filtered.length ? filtered.map(n => `
          <div class="note-row" onclick="openNote(${n.id})">
            <div class="text-[11px] font-bold text-white uppercase truncate mb-1">${n.title || 'Untitled'}</div>
            <div class="text-[9px] text-zinc-600 truncate uppercase">${n.body.substring(0, 35) || '...'}</div>
          </div>
        `).join('') : `<div class="p-20 text-[9px] text-zinc-800 text-center uppercase tracking-widest">No_Entries</div>`;
    }

    function createNewNote() {
      const id = Date.now();
      state.notes.unshift({ id, title: "", body: "", folder: state.activeFolder });
      openNote(id);
      setTimeout(() => noteTitle.focus(), 500);
    }

    function openNote(id) {
      state.activeNoteId = id;
      const note = state.notes.find(n => n.id === id);
      noteTitle.value = note.title;
      noteBody.value = note.body;
      editorView.classList.remove('view-hidden-right');
    }

    function closeEditor() {
      editorView.classList.add('view-hidden-right');
      sync();
      renderNotes();
    }

    function saveNote() {
      const note = state.notes.find(n => n.id === state.activeNoteId);
      if (note) {
        note.title = noteTitle.value;
        note.body = noteBody.value;
        sync();
      }
    }

    function deleteCurrentNote() {
      if (confirm("Confirm Purge?")) {
        state.notes = state.notes.filter(n => n.id !== state.activeNoteId);
        closeEditor();
      }
    }

    renderFolders();
    renderNotes();
  </script>
</body>

</html>
