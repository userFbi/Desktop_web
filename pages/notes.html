<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FocusOS // Notes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;800&display=swap");

    :root {
      --bg: #080808;
      --accent: #b3a577;
      --panel: #0d0d0d;
      --border: rgba(255, 255, 255, 0.05);
    }

    body {
      background: var(--bg);
      color: #fff;
      font-family: "JetBrains Mono", monospace;
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* Sidebar - Directory Navigation */
    .sidebar {
      width: 110px;
      background: #050505;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding-top: 30px;
      z-index: 20;
    }

    .nav-item {
      width: 100%;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      font-size: 9px;
      color: #333;
      text-transform: uppercase;
      transition: all 0.3s ease;
      cursor: pointer;
      letter-spacing: 1.5px;
      position: relative;
    }

    .nav-item.active {
      color: var(--accent);
      font-weight: 800;
      background: rgba(179, 165, 119, 0.03);
    }

    .nav-item.active::after {
      content: "";
      position: absolute;
      left: 0;
      width: 2px;
      height: 100%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    .home-icon {
      margin-left: 20px;
      margin-bottom: 40px;
      opacity: 0.4;
      color: var(--accent);
    }

    /* Main Content Area */
    .main-content {
      flex-grow: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    /* View Layering */
    .view {
      position: absolute;
      inset: 0;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      z-index: 25;
    }

    .view-hidden-right {
      transform: translateX(100%);
    }

    .search-bar {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      padding: 14px;
      margin: 0 25px 25px 25px;
      font-size: 10px;
      color: var(--accent);
      outline: none;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Note List Row Styling */
    .note-row {
      padding: 25px;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    .note-title-text {
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: block;
    }

    .note-preview-text {
      font-size: 10px;
      color: #444;
      line-height: 1.4;
      text-transform: uppercase;
      display: block;
    }

    /* Editor Specific Spacing - Fix for the cramped look */
    #note-title {
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      color: #fff;
      font-size: 24px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -1px;
      padding: 40px 30px 15px 30px;
      /* Added breathing room at bottom */
    }

    .editor-divider {
      height: 1px;
      background: linear-gradient(90deg, var(--border) 0%, transparent 90%);
      margin: 0 30px 25px 30px;
      /* Margin bottom creates the gap */
      opacity: 0.6;
    }

    textarea {
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      width: 100%;
      flex-grow: 1;
      color: #888;
      font-size: 15px;
      line-height: 2;
      /* Increased line spacing */
      padding: 0 30px 40px 30px;
    }

    .fab {
      position: fixed;
      bottom: 35px;
      right: 25px;
      width: 55px;
      height: 55px;
      background: var(--accent);
      color: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      z-index: 30;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>

<body>

  <aside class="sidebar">
    <a href="/index.html" class="home-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
      </svg>
    </a>
    <div id="folder-list" class="w-full flex flex-col"></div>
  </aside>

  <div class="main-content">
    <header class="pt-12">
      <h1 id="folder-label" class="px-7 text-[10px] text-zinc-700 tracking-[0.5em] uppercase mb-5">General</h1>
      <input type="text" id="search-input" class="search-bar w-[calc(100%-50px)]" placeholder="Filter_Nodes..."
        oninput="renderNotes()">
    </header>

    <div id="note-list" class="flex-grow overflow-y-auto no-scrollbar pb-24"></div>

    <button onclick="createNewNote()" class="fab">＋</button>

    <section id="editor-view" class="view view-hidden-right">
      <header class="p-6 border-b border-white/5 flex justify-between items-center bg-[#050505]">
        <button onclick="closeEditor()" class="text-[#b3a577] text-[10px] uppercase font-bold tracking-[0.2em]">
          << Back </button>
            <button onclick="deleteCurrentNote()" class="text-red-900 text-[10px] uppercase font-bold">Purge</button>
      </header>

      <input type="text" id="note-title" placeholder="ENTRY_TITLE" oninput="saveNote()">

      <div class="editor-divider"></div>

      <textarea id="note-body" placeholder="// Thought_Stream_Active..." oninput="saveNote()"></textarea>
    </section>
  </div>

  <script>
    let state = JSON.parse(localStorage.getItem("focus_mobile_v4")) || {
      folders: ["General", "Work", "Logs", "Vault"],
      notes: [],
      activeFolder: "General",
      activeNoteId: null
    };

    const noteList = document.getElementById('note-list');
    const editorView = document.getElementById('editor-view');
    const noteTitle = document.getElementById('note-title');
    const noteBody = document.getElementById('note-body');
    const folderLabel = document.getElementById('folder-label');

    function sync() { localStorage.setItem("focus_mobile_v4", JSON.stringify(state)); }

    function renderFolders() {
      const list = document.getElementById('folder-list');
      list.innerHTML = state.folders.map(f => `
          <div onclick="setFolder('${f}')" class="nav-item ${state.activeFolder === f ? 'active' : ''}">
            ${f}
          </div>
        `).join('');
      folderLabel.innerText = state.activeFolder;
    }

    function setFolder(f) {
      state.activeFolder = f;
      renderFolders();
      renderNotes();
    }

    function renderNotes() {
      const query = document.getElementById('search-input').value.toLowerCase();
      const filtered = state.notes.filter(n =>
        n.folder === state.activeFolder &&
        (n.title.toLowerCase().includes(query) || n.body.toLowerCase().includes(query))
      );

      noteList.innerHTML = filtered.length ? filtered.map(n => `
          <div class="note-row" onclick="openNote(${n.id})">
            <span class="note-title-text truncate">${n.title || 'Untitled_Entry'}</span>
            <span class="note-preview-text truncate">${n.body.substring(0, 45) || '// Empty_Data_Stream'}</span>
          </div>
        `).join('') : `<div class="p-20 text-[9px] text-zinc-900 text-center uppercase tracking-[0.4em]">No_Records_Found</div>`;
    }

    function createNewNote() {
      const id = Date.now();
      state.notes.unshift({ id, title: "", body: "", folder: state.activeFolder });
      openNote(id);
      setTimeout(() => noteTitle.focus(), 500);
    }

    function openNote(id) {
      state.activeNoteId = id;
      const note = state.notes.find(n => n.id === id);
      noteTitle.value = note.title;
      noteBody.value = note.body;
      editorView.classList.remove('view-hidden-right');
    }

    function closeEditor() {
      editorView.classList.add('view-hidden-right');
      sync();
      renderNotes();
    }

    function saveNote() {
      const note = state.notes.find(n => n.id === state.activeNoteId);
      if (note) {
        note.title = noteTitle.value;
        note.body = noteBody.value;
        sync();
      }
    }

    function deleteCurrentNote() {
      if (confirm("Execute Wipe Protocol for this entry?")) {
        state.notes = state.notes.filter(n => n.id !== state.activeNoteId);
        closeEditor();
      }
    }

    renderFolders();
    renderNotes();
  </script>
</body>

</html>
