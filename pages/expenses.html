<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fiscal_Tracker // FocusOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;800&display=swap");
      :root {
        --bg: #080808;
        --accent: #b3a577;
        --panel: #111111;
        --border: rgba(255, 255, 255, 0.05);
      }
      body {
        background: var(--bg);
        color: #fff;
        font-family: "JetBrains Mono", monospace;
        padding: 4rem;
        height: 100vh;
        overflow: hidden;
      }

      .ledger-scroll {
        height: calc(100vh - 450px);
        overflow-y: auto;
        padding-right: 15px;
      }
      .ledger-scroll::-webkit-scrollbar {
        width: 2px;
      }
      .ledger-scroll::-webkit-scrollbar-thumb {
        background: var(--accent);
      }

      .input-field {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--border);
        padding: 12px 16px;
        outline: none;
        color: #fff;
        transition: 0.3s;
        font-size: 12px;
      }
      .input-field:focus {
        border-color: var(--accent);
        background: rgba(179, 165, 119, 0.05);
      }

      .type-toggle {
        display: flex;
        border: 1px solid var(--border);
        padding: 4px;
        gap: 4px;
      }
      .type-btn {
        padding: 8px 16px;
        font-size: 9px;
        cursor: pointer;
        transition: 0.3s;
        opacity: 0.4;
        letter-spacing: 0.1em;
      }
      .type-btn.active {
        opacity: 1;
        background: var(--border);
        color: var(--accent);
        font-weight: bold;
      }

      .month-header {
        padding: 20px 0 10px 0;
        font-size: 10px;
        color: var(--accent);
        letter-spacing: 0.5em;
        border-bottom: 1px double rgba(179, 165, 119, 0.2);
        margin-top: 10px;
        text-transform: uppercase;
        font-weight: 800;
      }

      .ledger-row {
        border-bottom: 1px solid var(--border);
        transition: 0.2s;
      }
      .ledger-row:hover {
        background: rgba(255, 255, 255, 0.02);
      }

      .search-wrapper {
        position: relative;
      }
      .search-wrapper::before {
        content: "FILTER_";
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 8px;
        color: var(--accent);
        opacity: 0.5;
      }
      .search-input {
        padding-left: 60px !important;
      }
    </style>
  </head>
  <body>
    <div class="max-w-5xl mx-auto h-full flex flex-col">
      <a
        href="/index.html"
        class="text-[10px] text-[#b3a577] tracking-[0.4em] uppercase mb-8 block hover:opacity-100 opacity-60"
      >
        << Return_to_Core
      </a>

      <div class="flex justify-between items-end mb-12">
        <div>
          <h1
            class="text-2xl font-black tracking-tighter opacity-80 uppercase italic leading-none"
          >
            Fiscal_Tracker
          </h1>
          <p class="text-[9px] text-zinc-600 tracking-[0.3em] mt-2">
            CHRONOLOGICAL_LEDGER_SYSTEM
          </p>
        </div>
        <div class="flex gap-10 text-right">
          <div>
            <p class="text-[8px] text-zinc-600 uppercase mb-1">Income</p>
            <p id="total-income" class="text-lg font-light text-green-400">
              $0.00
            </p>
          </div>
          <div>
            <p class="text-[8px] text-zinc-600 uppercase mb-1">Burn</p>
            <p id="total-burn" class="text-lg font-light text-red-400">$0.00</p>
          </div>
          <div>
            <p class="text-[8px] text-zinc-600 uppercase mb-1">Net</p>
            <p id="net-balance" class="text-2xl font-bold text-[#b3a577]">
              $0.00
            </p>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-4 mb-8">
        <div
          class="bg-[#111] p-6 border border-white/5 flex flex-wrap gap-4 items-center"
        >
          <div class="type-toggle">
            <div
              id="btn-expense"
              class="type-btn active"
              onclick="setEntryType('expense')"
            >
              EXPENSE
            </div>
            <div
              id="btn-income"
              class="type-btn"
              onclick="setEntryType('income')"
            >
              INCOME
            </div>
          </div>
          <input
            type="text"
            id="desc"
            placeholder="Description"
            class="input-field flex-grow"
          />
          <input
            type="number"
            id="amt"
            placeholder="0.00"
            class="input-field w-28"
          />
          <button
            onclick="addEntry()"
            class="bg-[#b3a577] text-black px-6 py-3 text-[10px] font-black uppercase tracking-widest hover:bg-white transition-all"
          >
            Execute
          </button>
        </div>

        <div class="search-wrapper">
          <input
            type="text"
            id="search-bar"
            oninput="render()"
            placeholder="Search description or month..."
            class="input-field w-full search-input"
          />
        </div>
      </div>

      <div class="flex flex-col flex-grow">
        <div
          class="flex justify-between items-center text-[9px] text-zinc-600 uppercase tracking-[0.2em] border-b border-white/10 pb-3 mb-2"
        >
          <span>Monthly_Logs</span>
          <button onclick="clearLogs()" class="hover:text-red-500 transition">
            Purge_Database
          </button>
        </div>

        <div id="ledger-list" class="ledger-scroll"></div>
      </div>
    </div>

    <script>
      let currentType = "expense";
      let transactions = JSON.parse(
        localStorage.getItem("tp_transactions") || "[]",
      );

      function setEntryType(type) {
        currentType = type;
        document
          .getElementById("btn-expense")
          .classList.toggle("active", type === "expense");
        document
          .getElementById("btn-income")
          .classList.toggle("active", type === "income");
      }

      function addEntry() {
        const desc = document.getElementById("desc"),
          amt = document.getElementById("amt");
        if (!desc.value || !amt.value) return;

        const now = new Date();
        transactions.unshift({
          id: Date.now(),
          description: desc.value,
          amount: parseFloat(amt.value),
          type: currentType,
          date: now.toLocaleDateString("en-GB", {
            day: "2-digit",
            month: "2-digit",
          }),
          monthYear: now.toLocaleDateString("en-GB", {
            month: "long",
            year: "numeric",
          }),
        });

        localStorage.setItem("tp_transactions", JSON.stringify(transactions));
        desc.value = "";
        amt.value = "";
        render();
      }

      function clearLogs() {
        if (confirm("Wipe all data?")) {
          transactions = [];
          localStorage.removeItem("tp_transactions");
          render();
        }
      }

      function render() {
        const list = document.getElementById("ledger-list");
        const searchTerm = document
          .getElementById("search-bar")
          .value.toLowerCase();
        let income = 0,
          burn = 0;
        list.innerHTML = "";

        // Filter and Sort
        const filtered = transactions.filter(
          (t) =>
            t.description.toLowerCase().includes(searchTerm) ||
            t.monthYear.toLowerCase().includes(searchTerm),
        );

        let lastMonth = "";

        filtered.forEach((t) => {
          // Calculate Totals based on ALL (standard behavior)
          // To calculate only based on search, move this outside filtered.forEach

          // Display Month Header if month changes
          if (t.monthYear !== lastMonth) {
            const header = document.createElement("div");
            header.className = "month-header";
            header.innerText = t.monthYear;
            list.appendChild(header);
            lastMonth = t.monthYear;
          }

          const row = document.createElement("div");
          row.className =
            "ledger-row flex items-center justify-between py-4 text-[11px]";
          row.innerHTML = `
            <div class="flex items-center gap-6">
              <span class="text-zinc-600 font-mono text-[9px]">${t.date}</span>
              <span class="text-zinc-300 tracking-wide uppercase font-medium">${t.description}</span>
              <span class="text-[8px] px-1.5 border ${t.type === "income" ? "border-green-900 text-green-500" : "border-red-900 text-red-500"} opacity-50 uppercase">${t.type}</span>
            </div>
            <span class="font-bold ${t.type === "income" ? "text-green-400" : "text-[#b3a577]"}">
              ${t.type === "income" ? "+" : "-"}$${t.amount.toFixed(2)}
            </span>
          `;
          list.appendChild(row);
        });

        // Recalculate totals from full transaction list
        transactions.forEach((t) => {
          if (t.type === "income") income += t.amount;
          else burn += t.amount;
        });

        document.getElementById("total-income").innerText =
          `$${income.toFixed(2)}`;
        document.getElementById("total-burn").innerText = `$${burn.toFixed(2)}`;
        const net = income - burn;
        const netEl = document.getElementById("net-balance");
        netEl.innerText = `$${net.toFixed(2)}`;
        netEl.style.color = net < 0 ? "#f87171" : "#b3a577";
      }

      render();
    </script>
  </body>
</html>
