<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusOS | Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

      :root {
        --bg-dark: #0a0a0a;
        --card-dark: #141414;
        --accent: #b3a577;
      }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--bg-dark);
        color: white;
        transition: background 0.5s ease;
      }

      .premium-card {
        background: var(--card-dark);
        border: 1px solid #1f1f1f;
        border-radius: 32px;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .focus-dim {
        opacity: 0.15;
        filter: blur(4px);
        pointer-events: none;
      }

      .no-blur {
        opacity: 1 !important;
        filter: blur(0) !important;
        transform: scale(1.05);
        z-index: 50;
      }

      .circle-frame {
        width: 240px;
        height: 240px;
        border-radius: 50%;
        overflow: hidden;
        border: 2px solid #222;
      }

      .heading {
        color: var(--accent) !important;
      }

      /* Custom Scrollbar - Only inside the Priority list */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #222;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: var(--accent);
      }
    </style>
  </head>
  <body class="p-6 md:p-12">
    <nav
      id="main-nav"
      class="flex justify-between items-center max-w-6xl mx-auto mb-16 relative"
    >
      <div class="text-xl font-black italic tracking-tighter">Tp</div>

      <div
        id="nav-links"
        class="hidden flex items-center gap-8 font-bold text-xs tracking-widest uppercase"
      >
        <a href="#" class="text-white hover:text-[#b3a577] transition">Home</a>
        <a href="#" class="text-zinc-500 hover:text-white transition">About</a>
        <a href="#" class="text-zinc-500 hover:text-white transition">Bits</a>
        <a href="#" class="text-zinc-500 hover:text-white transition">Pixels</a>
        <a href="#" class="text-zinc-500 hover:text-white transition"
          >Contact</a
        >
      </div>

      <div
        id="menu-toggle"
        class="cursor-pointer group relative w-8 h-8 flex items-center justify-center"
      >
        <div
          id="icon-bars"
          class="absolute inset-0 flex flex-col items-end justify-center gap-1.5 transition-all duration-200"
        >
          <div
            class="w-8 h-1 bg-white rounded-full transition-all group-hover:w-5"
          ></div>
          <div
            class="w-5 h-1 bg-zinc-600 rounded-full transition-all group-hover:w-8"
          ></div>
        </div>
        <div
          id="icon-close"
          class="absolute opacity-0 scale-75 rotate-[-45deg] transition-all duration-200 text-[#b3a577] pointer-events-none"
        >
          <i data-lucide="x" class="w-8 h-8"></i>
        </div>
      </div>
    </nav>

    <main
      class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-12 items-start"
    >
      <div
        id="profile-section"
        class="lg:col-span-5 flex flex-col items-center text-center transition-all duration-500 mt-16"
      >
        <div class="circle-frame mb-10 shadow-[0_0_50px_rgba(0,0,0,0.5)]">
          <img src="1.jpg" class="w-full h-full object-cover" />
        </div>
        <h1 class="text-5xl font-extrabold tracking-tight mb-4">
          Cheers. I am <span class="heading">Fabian.</span>
        </h1>
        <p class="text-zinc-500 text-lg font-light tracking-wide max-w-xs">
          Currently building digital interfaces in
          <span class="text-white">Surat</span>.
        </p>
      </div>

      <div class="lg:col-span-7 grid grid-cols-1 md:grid-cols-2 gap-6">
        <div
          id="timer-card"
          class="premium-card p-10 flex flex-col justify-between items-center min-h-[340px]"
        >
          <span
            class="text-[10px] font-bold tracking-[0.3em] uppercase text-zinc-600"
            >Deep Work</span
          >
          <div
            id="timer-display"
            class="text-8xl font-light tracking-tighter my-8"
          >
            25:00
          </div>
          <div class="flex gap-3 w-full">
            <button
              onclick="toggleTimer()"
              id="timer-btn"
              class="flex-1 bg-white text-black py-4 rounded-2xl font-bold hover:bg-zinc-200 transition"
            >
              Start
            </button>
            <button
              onclick="resetTimer()"
              class="p-4 bg-zinc-800 rounded-2xl hover:bg-zinc-700 transition"
            >
              <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </button>
          </div>
        </div>

        <div
          id="weather-card"
          class="premium-card p-10 flex flex-col justify-between transition-all duration-500"
        >
          <div class="flex justify-between items-start">
            <div>
              <p class="text-[10px] font-bold text-zinc-600 uppercase mb-1">
                Local Sky
              </p>
              <h2 class="text-xl font-bold">Surat</h2>
            </div>
            <div id="weather-icon"></div>
          </div>
          <div class="mt-4">
            <span id="temp" class="text-6xl font-light">--°</span>
            <p id="desc" class="text-zinc-500 text-sm capitalize">Loading...</p>
          </div>
          <div class="flex gap-4 mt-6">
            <div class="bg-zinc-900/50 p-3 rounded-2xl flex-1 text-center">
              <p class="text-[8px] text-zinc-600 uppercase">Humidity</p>
              <p id="humidity" class="text-xs font-bold">--%</p>
            </div>
            <div class="bg-zinc-900/50 p-3 rounded-2xl flex-1 text-center">
              <p class="text-[8px] text-zinc-600 uppercase">Feels Like</p>
              <p id="feels-like" class="text-xs font-bold">--°C</p>
            </div>
          </div>
        </div>

        <div
          id="task-card"
          class="premium-card p-8 md:col-span-2 transition-all duration-500"
        >
          <div class="flex justify-between items-center mb-8">
            <h3 class="text-lg font-bold">Daily Priorities</h3>
            <button
              onclick="addTodo()"
              class="text-zinc-500 hover:text-white transition"
            >
              <i data-lucide="plus-circle" class="w-6 h-6"></i>
            </button>
          </div>
          <ul
            id="todo-list"
            class="space-y-3 max-h-[135px] overflow-y-auto pr-2 custom-scrollbar"
          ></ul>
        </div>
      </div>
    </main>

    <script>
      // --- Navigation ---
      function initNavigation() {
        const menuToggle = document.getElementById('menu-toggle')
        const navLinks = document.getElementById('nav-links')
        const iconBars = document.getElementById('icon-bars')
        const iconClose = document.getElementById('icon-close')
        let isOpen = false

        menuToggle.addEventListener('click', () => {
          isOpen = !isOpen
          navLinks.classList.toggle('hidden')
          if (isOpen) {
            iconBars.classList.add('opacity-0', 'scale-75', 'rotate-45')
            iconClose.classList.remove(
              'opacity-0',
              'scale-75',
              'pointer-events-none',
              'rotate-[-45deg]'
            )
            iconClose.classList.add('opacity-100', 'scale-100', 'rotate-0')
          } else {
            iconBars.classList.remove('opacity-0', 'scale-75', 'rotate-45')
            iconClose.classList.add(
              'opacity-0',
              'scale-75',
              'pointer-events-none',
              'rotate-[-45deg]'
            )
            iconClose.classList.remove('opacity-100', 'scale-100', 'rotate-0')
          }
          lucide.createIcons()
        })
      }

      // --- Timer ---
      let timeLeft = 1500
      let timerId = null
      let todos = JSON.parse(localStorage.getItem('dark_focus_tasks')) || [
        { text: 'Finish React UI refactor', done: false },
        { text: 'Update portfolio logic', done: true }
      ]

      function toggleTimer() {
        const btn = document.getElementById('timer-btn')
        const elementsToDim = [
          'main-nav',
          'profile-section',
          'weather-card',
          'task-card'
        ].map(id => document.getElementById(id))

        if (timerId) {
          clearInterval(timerId)
          timerId = null
          btn.innerText = 'Start'
          btn.className =
            'flex-1 bg-white text-black py-4 rounded-2xl font-bold hover:bg-zinc-200 transition'
          elementsToDim.forEach(el => el.classList.remove('focus-dim'))
          document.getElementById('timer-card').classList.remove('no-blur')
        } else {
          timerId = setInterval(() => {
            timeLeft--
            updateDisplay()
            if (timeLeft <= 0) {
              clearInterval(timerId)
              resetTimer()
              alert('Focus complete!')
            }
          }, 1000)
          btn.innerText = 'Pause'
          btn.className =
            'flex-1 bg-zinc-800 text-white py-4 rounded-2xl font-bold transition'
          elementsToDim.forEach(el => el.classList.add('focus-dim'))
          document.getElementById('timer-card').classList.add('no-blur')
        }
      }

      function resetTimer() {
        clearInterval(timerId)
        timerId = null
        timeLeft = 1500
        updateDisplay()
        const btn = document.getElementById('timer-btn')
        btn.innerText = 'Start'
        btn.className =
          'flex-1 bg-white text-black py-4 rounded-2xl font-bold hover:bg-zinc-200 transition'
        ;['main-nav', 'profile-section', 'weather-card', 'task-card'].forEach(
          id => document.getElementById(id).classList.remove('focus-dim')
        )
        document.getElementById('timer-card').classList.remove('no-blur')
      }

      function updateDisplay() {
        const m = Math.floor(timeLeft / 60)
        const s = timeLeft % 60
        document.getElementById('timer-display').innerText = `${m}:${s
          .toString()
          .padStart(2, '0')}`
      }

      // --- Weather ---
      async function fetchWeather() {
        try {
          const res = await fetch(
            'https://api.open-meteo.com/v1/forecast?latitude=21.1702&longitude=72.8311&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code&timezone=auto'
          )
          const data = await res.json()
          const cur = data.current
          document.getElementById('temp').innerText = `${Math.round(
            cur.temperature_2m
          )}°`
          document.getElementById(
            'humidity'
          ).innerText = `${cur.relative_humidity_2m}%`
          document.getElementById('feels-like').innerText = `${Math.round(
            cur.apparent_temperature
          )}°C`
          const codes = {
            0: 'Clear',
            1: 'Mainly Clear',
            2: 'Cloudy',
            3: 'Overcast',
            61: 'Rain'
          }
          document.getElementById('desc').innerText =
            codes[cur.weather_code] || 'Clear'
          const iconMap = {
            0: 'sun',
            1: 'cloud-sun',
            2: 'cloud',
            3: 'clouds',
            61: 'cloud-rain'
          }
          const iconName = iconMap[cur.weather_code] || 'sun'
          document.getElementById(
            'weather-icon'
          ).innerHTML = `<i data-lucide="${iconName}" class="w-8 h-8 text-[#b3a577]"></i>`
          lucide.createIcons()
        } catch (e) {
          console.error('Weather failed')
        }
      }

      // --- Todo ---
      function renderTodos() {
        const list = document.getElementById('todo-list')
        list.innerHTML = todos
          .map(
            (t, i) => `
          <li class="flex items-center justify-between group bg-zinc-900/30 p-3 rounded-2xl hover:bg-zinc-900/50 transition">
            <label class="flex items-center gap-4 cursor-pointer flex-1">
              <input type="checkbox" class="hidden" ${
                t.done ? 'checked' : ''
              } onchange="toggleTodo(${i})">
              <div class="w-6 h-6 rounded-full border-2 border-zinc-700 flex items-center justify-center transition ${
                t.done ? 'bg-white border-white' : ''
              }">
                ${
                  t.done
                    ? '<i data-lucide="check" class="text-black w-3 h-3"></i>'
                    : ''
                }
              </div>
              <span class="text-sm font-medium ${
                t.done ? 'text-zinc-600 line-through' : 'text-zinc-200'
              }">${t.text}</span>
            </label>
            <button onclick="deleteTodo(${i})" class="opacity-0 group-hover:opacity-100 text-zinc-600 hover:text-red-500 transition px-2">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </li>
        `
          )
          .join('')
        lucide.createIcons()
        localStorage.setItem('dark_focus_tasks', JSON.stringify(todos))
      }

      function addTodo() {
        const val = prompt('Priority Task:')
        if (val) {
          todos.unshift({ text: val, done: false })
          renderTodos()
        }
      }
      function toggleTodo(i) {
        todos[i].done = !todos[i].done
        renderTodos()
      }
      function deleteTodo(i) {
        todos.splice(i, 1)
        renderTodos()
      }

      // --- Startup ---
      document.addEventListener('DOMContentLoaded', () => {
        fetchWeather()
        renderTodos()
        initNavigation()
        lucide.createIcons()
      })
    </script>
  </body>
</html>
