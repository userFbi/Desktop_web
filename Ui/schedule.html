<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusOS | Weekly Time-Blocker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap");

      :root {
        --bg: #0a0a0a;
        --card: #141414;
        --accent: #b3a577;
        --border: #1f1f1f;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: var(--bg);
        color: white;
        padding-top: 60px;
      }

      .planner-grid {
        display: grid;
        grid-template-columns: 100px repeat(7, 1fr);
        border-top: 1px solid var(--border);
        border-left: 1px solid var(--border);
      }

      .grid-header {
        background: var(--card);
        color: var(--accent);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding: 15px 5px;
        text-align: center;
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
      }

      .time-label {
        background: #0d0d0d;
        font-family: monospace;
        font-size: 9px;
        color: #555;
        display: flex;
        align-items: center;
        justify-content: center;
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
      }

      .cell {
        background: transparent;
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        height: 45px;
        padding: 4px;
        transition: all 0.2s;
      }

      .cell:focus-within {
        background: rgba(179, 165, 119, 0.05);
      }

      .cell textarea {
        width: 100%;
        height: 100%;
        background: transparent;
        border: none;
        outline: none;
        color: #ccc;
        font-size: 11px;
        resize: none;
        line-height: 1.2;
      }

      .cell textarea:focus {
        color: white;
      }

      /* Custom Scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: var(--accent);
        border-radius: 10px;
      }

      @media print {
        .no-print {
          display: none;
        }
        body {
          padding: 0;
          background: white;
          color: black;
        }
        .planner-grid {
          border-color: #ddd;
        }
        .grid-header {
          background: #eee;
          color: black;
          border-color: #ddd;
        }
        .time-label {
          background: #f9f9f9;
          color: #666;
          border-color: #ddd;
        }
        .cell {
          border-color: #ddd;
        }
        .cell textarea {
          color: black;
        }
      }
    </style>
  </head>
  <body class="p-4 md:p-10">
    <div
      class="fixed top-0 left-0 w-full h-10 bg-black/40 backdrop-blur-md border-b border-white/5 z-[100] flex items-center justify-between px-6 text-[9px] font-mono tracking-[0.2em] text-zinc-500 no-print"
    >
      <div class="flex items-center gap-4">
        <span class="flex items-center gap-1.5"
          ><span class="w-1.5 h-1.5 rounded-full bg-[#b3a577]"></span>
          TIME_BLOCKER_V1</span
        >
      </div>
      <div class="flex items-center gap-4">
        <button onclick="window.print()" class="hover:text-white transition">
          PRINT_PDF
        </button>
        <button onclick="clearAll()" class="hover:text-red-400 transition">
          CLEAR_ALL
        </button>
      </div>
    </div>

    <div class="max-w-7xl mx-auto">
      <header class="mb-10 flex justify-between items-end">
        <div>
          <h1 class="text-4xl font-extrabold tracking-tighter">
            Weekly <span class="text-[#b3a577]">Planner.</span>
          </h1>
          <p
            class="text-zinc-500 text-[10px] font-mono uppercase tracking-[0.3em] mt-2"
          >
            Operational Schedule // Surat, IN
          </p>
        </div>
        <a
          href="index.html"
          class="no-print text-zinc-600 hover:text-white text-[10px] font-bold uppercase tracking-widest mb-1 flex items-center gap-2"
        >
          <i data-lucide="arrow-left" class="w-3 h-3"></i> Dashboard
        </a>
      </header>

      <div
        class="planner-grid rounded-xl overflow-hidden border-r border-b border-[#1f1f1f]"
      >
        <div class="grid-header">Time</div>
        <div class="grid-header">Mon</div>
        <div class="grid-header">Tue</div>
        <div class="grid-header">Wed</div>
        <div class="grid-header">Thu</div>
        <div class="grid-header">Fri</div>
        <div class="grid-header">Sat</div>
        <div class="grid-header">Sun</div>

        <script>
          const hours = [
            "05 AM",
            "06 AM",
            "07 AM",
            "08 AM",
            "09 AM",
            "10 AM",
            "11 AM",
            "12 PM",
            "01 PM",
            "02 PM",
            "03 PM",
            "04 PM",
            "05 PM",
            "06 PM",
            "07 PM",
            "08 PM",
            "09 PM",
            "10 PM",
            "11 PM",
          ];
          const days = ["mon", "tue", "wed", "thu", "fri", "sat", "sun"];

          hours.forEach((hour) => {
            // Time Label
            document.write(`<div class="time-label">${hour}</div>`);

            // Day Cells
            days.forEach((day) => {
              const id = `${day}-${hour.replace(" ", "")}`;
              document.write(`
                            <div class="cell">
                                <textarea id="${id}" oninput="saveData('${id}', this.value)" spellcheck="false"></textarea>
                            </div>
                        `);
            });
          });
        </script>
      </div>
    </div>

    <script>
      // Load data on start
      window.onload = () => {
        lucide.createIcons();
        const textareas = document.querySelectorAll("textarea");
        textareas.forEach((ta) => {
          ta.value = localStorage.getItem("planner-" + ta.id) || "";
        });
      };

      // Save data to localStorage
      function saveData(id, value) {
        localStorage.setItem("planner-" + id, value);
      }

      // Clear all cells
      function clearAll() {
        if (confirm("Wipe entire weekly schedule?")) {
          const textareas = document.querySelectorAll("textarea");
          textareas.forEach((ta) => {
            ta.value = "";
            localStorage.removeItem("planner-" + ta.id);
          });
        }
      }
    </script>
  </body>
</html>
